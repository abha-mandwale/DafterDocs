<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#08111d",
              slate: "#102033",
              mist: "#e7eef8",
              accent: "#f97316",
              mint: "#10b981",
              panel: "#ffffff"
            },
            boxShadow: {
              soft: "0 18px 45px rgba(8, 17, 29, 0.10)"
            }
          }
        }
      };
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}?v={{ asset_version|default('1') }}" />
  </head>
  <body data-page="{{ page_name|default('') }}" class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(249,115,22,0.18),_transparent_26%),linear-gradient(180deg,_#f6f9fc_0%,_#eef4fb_44%,_#f8fafc_100%)] text-ink">
    {% block content %}{% endblock %}
    <script src="{{ url_for('static', path='/js/app.js') }}?v={{ asset_version|default('1') }}"></script>
  </body>
</html>
